<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>霧臺國小 - 學生作答</title>

    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <!-- Firebase SDK -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"
            }
        }
    </script>

    <!-- 主視覺樣式 -->
    <link rel="stylesheet" href="css/style.css" />

    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang TC', system-ui, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 40%, #fdf2f8 100%);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            padding-top: calc(12px + var(--safe-top));
            padding-bottom: calc(12px + var(--safe-bottom));
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 主容器 */
        .student-container {
            width: 100%;
            max-width: 680px;
            height: calc(100dvh - 24px - var(--safe-top) - var(--safe-bottom));
            max-height: 800px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 28px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 頂部資訊列 */
        .stu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            background: rgba(255,255,255,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            gap: 8px;
            flex-shrink: 0;
        }
        .stu-header .identity { display: flex; align-items: center; gap: 6px; flex: 1; overflow: hidden; }
        .stu-header .change-btn {
            font-size: 11px; font-weight: 500; color: var(--primary);
            background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.4);
            border-radius: 20px; padding: 4px 10px; cursor: pointer;
            display: flex; align-items: center; gap: 4px; flex-shrink: 0;
        }
        .stu-header .change-btn:hover { background: white; }
        .stu-header .change-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .lang-toggle { display: flex; gap: 2px; }
        .lang-toggle button {
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid transparent; background: rgba(255,255,255,0.5);
            font-size: 12px; font-weight: 600; cursor: pointer;
        }
        .lang-toggle button.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        /* 跑馬燈（固定高度，不跳動） */
        .stu-marquee {
            height: 40px; min-height: 40px; max-height: 40px;
            padding: 0 18px; font-size: 15px; font-weight: 600;
            display: flex; align-items: center; flex-shrink: 0;
            background: rgba(255,200,50,0.08); color: transparent;
            overflow: hidden; white-space: nowrap; position: relative;
        }
        .stu-marquee.active { color: #b45309; background: rgba(255,200,50,0.2); }
        .stu-marquee.scroll span {
            display: inline-block; animation: marquee 8s linear 2;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 題目區 */
        .stu-question {
            padding: 12px 18px; display: flex; align-items: center; gap: 10px;
            font-size: 16px; font-weight: 600; color: var(--text-primary);
            background: rgba(255,255,255,0.4); flex-shrink: 0;
        }
        .stu-question .q-score {
            margin-left: auto; font-size: 13px; color: var(--primary);
            background: rgba(79,70,229,0.1); padding: 4px 10px; border-radius: 20px;
        }

        /* 計時器 */
        .stu-timer {
            text-align: center; font-size: 40px; font-weight: 700; padding: 4px;
            color: var(--text-primary); flex-shrink: 0; min-height: 48px;
        }
        .stu-timer.urgent { color: var(--danger); animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* 作答區 */
        .stu-answer {
            flex: 1; display: flex; flex-direction: column; padding: 12px 18px;
            gap: 10px; overflow-y: auto; min-height: 0;
        }
        .choice-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1;
            align-content: center;
        }
        .choice-btn {
            background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.6); border-radius: 20px;
            font-size: 24px; font-weight: 700; color: var(--text-primary);
            cursor: pointer; min-height: 60px; transition: all 0.2s;
        }
        .choice-btn:hover:not(:disabled):not(.locked) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .choice-btn.selected { border-color: var(--primary); background: rgba(79,70,229,0.15); }
        .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .choice-btn.locked { opacity: 0.6; }
        .text-input-wrap { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .text-input-wrap textarea {
            flex: 1; padding: 14px; border: 2px solid rgba(0,0,0,0.08);
            border-radius: 18px; font-size: 16px; background: rgba(255,255,255,0.8);
            resize: none; font-family: inherit; min-height: 100px;
        }
        .text-input-wrap textarea:disabled { opacity: 0.4; }
        .char-count { text-align: right; font-size: 12px; color: var(--text-muted); }

        /* 送出按鈕 */
        .stu-submit { flex-shrink: 0; padding: 0 18px 14px; }
        .stu-submit button {
            width: 100%; padding: 14px; border: none; border-radius: 18px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white; font-size: 18px; font-weight: 700; cursor: pointer;
            box-shadow: 0 6px 18px rgba(79,70,229,0.3);
        }
        .stu-submit button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(79,70,229,0.4); }
        .stu-submit button:disabled { opacity: 0.4; cursor: not-allowed; }
        .stu-submit button.submitted { background: linear-gradient(135deg, #10b981, #059669); }

        /* 狀態列 */
        .stu-status {
            flex-shrink: 0; text-align: center; padding: 8px; font-size: 13px;
            font-weight: 600; color: var(--text-secondary);
            background: rgba(255,255,255,0.4); border-top: 1px solid rgba(255,255,255,0.6);
        }

        /* 彈窗（投票、搶答） */
        .stu-modal-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 20;
        }
        .stu-modal-overlay.hidden { display: none; }
        .stu-modal-box {
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border-radius: 24px;
            padding: 28px; width: 90%; max-width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center;
        }
        .stu-modal-box .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
        .stu-modal-box .buzz-display { font-size: 72px; font-weight: 700; margin: 16px 0; }
        .stu-modal-box .vote-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .stu-modal-box .vote-options button {
            padding: 12px; border-radius: 14px; border: 2px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.7); font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .stu-modal-box .vote-options button.selected { border-color: var(--primary); background: rgba(79,70,229,0.1); }
        .stu-modal-box .vote-options button:disabled { opacity: 0.4; cursor: not-allowed; }
        .stu-modal-box .btn-close {
            margin-top: 12px; padding: 10px 24px; border: none; border-radius: 14px;
            background: rgba(255,255,255,0.6); font-size: 14px; font-weight: 600; cursor: pointer;
        }

        /* 登入畫面 */
        .login-overlay {
            position: absolute; inset: 0; background: rgba(255,255,255,0.85);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 16px; padding: 24px; z-index: 30;
            border-radius: 28px;
        }
        .login-overlay.hidden { display: none; }
        .login-title { font-size: 28px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .login-subtitle { font-size: 15px; color: var(--text-secondary); }
        .login-input {
            width: 100%; max-width: 240px; padding: 14px; text-align: center;
            font-size: 28px; font-weight: 700; letter-spacing: 8px;
            border: 2px solid rgba(0,0,0,0.08); border-radius: 20px;
            background: rgba(255,255,255,0.8); color: var(--primary);
        }
        .login-join {
            width: 100%; max-width: 240px; padding: 14px; border: none;
            border-radius: 20px; background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white; font-size: 18px; font-weight: 700; cursor: pointer;
            box-shadow: 0 6px 18px rgba(79,70,229,0.3);
        }
        .login-selects { display: flex; gap: 8px; width: 100%; max-width: 320px; }
        .login-selects select {
            flex: 1; padding: 10px; border-radius: 14px; border: 1px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.7); font-size: 15px; font-weight: 500;
        }
        .login-status { font-size: 13px; color: var(--text-muted); text-align: center; }

        .hidden { display: none !important; }

        /* 響應式 */
        @media (max-width: 480px) {
            .student-container { height: calc(100dvh - 8px); max-height: none; border-radius: 20px; }
            .choice-btn { font-size: 18px; min-height: 48px; }
            .stu-timer { font-size: 32px; }
            .stu-question { font-size: 14px; }
            .stu-marquee { height: 34px; min-height: 34px; max-height: 34px; font-size: 13px; }
        }
        @media (min-width: 768px) and (orientation: landscape) {
            .student-container { height: calc(100dvh - 40px); max-height: 700px; }
            .stu-question { font-size: 18px; padding: 16px 20px; }
            .stu-timer { font-size: 44px; min-height: 56px; }
            .choice-btn { font-size: 26px; min-height: 70px; }
            .stu-marquee { height: 44px; min-height: 44px; max-height: 44px; font-size: 16px; }
            .stu-submit button { font-size: 20px; padding: 16px; }
        }
    </style>
</head>
<body>

    <div class="student-container" id="app">

        <!-- 頂部資訊列 -->
        <div class="stu-header">
            <span class="identity">
                <span id="identityText">--</span>
                <button class="change-btn" id="changeStudentBtn" disabled>
                    <span class="material-symbols-outlined" style="font-size:14px;">autorenew</span> <span id="changeLabel" data-i18n="studentChange">更換</span>
                </button>
            </span>
            <span class="lang-toggle" id="langToggle">
                <button data-lang="zh" class="active" id="langZh">中</button>
                <button data-lang="en" id="langEn">EN</button>
            </span>
            <span style="font-size:12px; color:var(--text-muted);" id="roomDisplay">----</span>
            <span style="font-size:12px;" id="roundDisplay">題號：--</span>
        </div>

        <!-- 跑馬燈 -->
        <div class="stu-marquee" id="marqueeArea"><span></span></div>

        <!-- 題目區 -->
        <div class="stu-question" id="questionArea">
            <span class="material-symbols-outlined">book_open</span>
            <span id="questionText">等待教師出題...</span>
            <span class="q-score" id="scoreDisplay">1分</span>
        </div>

        <!-- 計時器 -->
        <div class="stu-timer" id="timerDisplay">--</div>

        <!-- 作答區 -->
        <div class="stu-answer hidden" id="answerArea">
            <div class="choice-grid" id="choiceGrid">
                <button class="choice-btn" data-choice="A" disabled>A</button>
                <button class="choice-btn" data-choice="B" disabled>B</button>
                <button class="choice-btn" data-choice="C" disabled>C</button>
                <button class="choice-btn" data-choice="D" disabled>D</button>
            </div>
            <div class="text-input-wrap hidden" id="textInputWrap">
                <textarea id="textInput" placeholder="請輸入你的答案..." disabled></textarea>
                <div class="char-count" id="charCount">0 字</div>
            </div>
        </div>

        <!-- 送出按鈕 -->
        <div class="stu-submit hidden" id="submitArea">
            <button id="submitBtn" disabled>
                <span class="material-symbols-outlined" style="font-size:18px;">send</span> <span id="submitLabel" data-i18n="studentAnswering">送出答案</span>
            </button>
        </div>

        <!-- 狀態列 -->
        <div class="stu-status" id="statusBar">
            <span class="material-symbols-outlined" style="font-size:14px;">hourglass_empty</span> <span id="statusText">等待教師開始</span>
        </div>

        <!-- 投票彈窗 -->
        <div class="stu-modal-overlay hidden" id="voteModal">
            <div class="stu-modal-box">
                <div class="modal-title" data-i18n="voteTitle">即時投票</div>
                <div class="vote-options" id="voteOptionsList"></div>
                <button class="login-join" id="voteSubmitBtn" data-i18n="voteSubmit">送出投票</button>
                <button class="btn-close" id="voteCloseBtn" data-i18n="close">關閉</button>
            </div>
        </div>

        <!-- 搶答彈窗 -->
        <div class="stu-modal-overlay hidden" id="buzzModal">
            <div class="stu-modal-box">
                <div class="modal-title" data-i18n="buzzTitle">搶答</div>
                <div class="buzz-display" id="buzzCountdownDisplay">5</div>
                <button class="login-join" id="buzzBtn" disabled data-i18n="buzzBtn">搶答</button>
                <button class="btn-close" id="buzzCloseBtn" data-i18n="close">關閉</button>
            </div>
        </div>

        <!-- 登入畫面 -->
        <div class="login-overlay" id="loginScreen">
            <div class="login-title">
                <span class="material-symbols-outlined" style="font-size:32px;">school</span>
                <span data-i18n="studentTitle">霧臺國小</span>
            </div>
            <div class="login-subtitle" data-i18n="studentLogin">請輸入教室代碼並選擇座號</div>
            <input type="text" class="login-input" id="roomInput" placeholder="0000" maxlength="4" inputmode="numeric" />
            <button class="login-join" id="joinRoomBtn">
                <span class="material-symbols-outlined" style="font-size:18px;">door_open</span> <span data-i18n="studentJoin">加入教室</span>
            </button>
            <div class="login-selects">
                <select id="classSelect" disabled>
                    <option value="" data-i18n="studentSelectClass">-- 班級 --</option>
                </select>
                <select id="seatSelect" disabled>
                    <option value="" data-i18n="studentSelectSeat">-- 座號 --</option>
                </select>
            </div>
            <div class="login-status" id="loginStatus">
                <span data-i18n="studentLoginStatus">輸入教室代碼後加入</span>
            </div>
        </div>

    </div>
        <script type="module">
        import { initializeApp } from "firebase/app";
        import {
            getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc,
            collection, query, where, onSnapshot, getDocs, writeBatch,
            serverTimestamp
        } from "firebase/firestore";

        import { zh } from './locales/zh.js';
        import { en } from './locales/en.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAVllhBuONIqLlPlvCgnozPEE2834HFTxA",
            authDomain: "classqna-7898b.firebaseapp.com",
            projectId: "classqna-7898b",
            storageBucket: "classqna-7898b.firebasestorage.app",
            messagingSenderId: "145272240036",
            appId: "1:145272240036:web:3a286ec303c476066df331"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // 語言管理
        // ============================================================
        let currentLang = 'zh';
        function t(key) {
            const dict = currentLang === 'zh' ? zh : en;
            return dict[key] || key;
        }

        function updateAllTexts() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                const text = t(key);
                if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                    el.placeholder = text;
                } else {
                    el.textContent = text;
                }
            });
            document.getElementById('langZh').className = currentLang === 'zh' ? 'active' : '';
            document.getElementById('langEn').className = currentLang === 'en' ? 'active' : '';
            if (STATE.studentId) updateIdentityDisplay();
        }

        document.getElementById('langZh').addEventListener('click', () => { currentLang = 'zh'; updateAllTexts(); });
        document.getElementById('langEn').addEventListener('click', () => { currentLang = 'en'; updateAllTexts(); });

        // ============================================================
        // 全域狀態
        // ============================================================
        const STATE = {
            roomId: null,
            studentId: null,
            studentName: null,
            selectedClass: '',
            selectedSeat: '',
            isLoggedIn: false,
            isAnswering: false,
            isLocked: false,
            isScreenLocked: false,
            questionType: 'choice',
            questionScore: 1,
            currentRoundId: null,
            currentQuestion: 0,
            myAnswer: null,
            rosterData: {},
            allStudents: [],
            // 投票
            voteActive: false,
            voteOptions: [],
            voteLocked: false,
            // 搶答
            buzzActive: false,
            buzzCountdown: 5,
            buzzLocked: false,
        };

        // ============================================================
        // DOM 參照
        // ============================================================
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const identityText = $('#identityText');
        const changeStudentBtn = $('#changeStudentBtn');
        const roomDisplay = $('#roomDisplay');
        const roundDisplay = $('#roundDisplay');
        const marqueeArea = $('#marqueeArea');
        const marqueeSpan = marqueeArea.querySelector('span');
        const questionText = $('#questionText');
        const scoreDisplay = $('#scoreDisplay');
        const timerDisplay = $('#timerDisplay');
        const choiceGrid = $('#choiceGrid');
        const choiceBtns = choiceGrid.querySelectorAll('.choice-btn');
        const textInputWrap = $('#textInputWrap');
        const textInput = $('#textInput');
        const charCount = $('#charCount');
        const submitArea = $('#submitArea');
        const submitBtn = $('#submitBtn');
        const answerArea = $('#answerArea');
        const statusBar = $('#statusBar');
        const statusText = $('#statusText');
        const loginScreen = $('#loginScreen');

        const roomInput = $('#roomInput');
        const joinRoomBtn = $('#joinRoomBtn');
        const classSelect = $('#classSelect');
        const seatSelect = $('#seatSelect');
        const loginStatus = $('#loginStatus');

        // 彈窗
        const voteModal = $('#voteModal');
        const voteOptionsList = $('#voteOptionsList');
        const voteSubmitBtn = $('#voteSubmitBtn');
        const voteCloseBtn = $('#voteCloseBtn');
        const buzzModal = $('#buzzModal');
        const buzzCountdownDisplay = $('#buzzCountdownDisplay');
        const buzzBtn = $('#buzzBtn');
        const buzzCloseBtn = $('#buzzCloseBtn');

        // ============================================================
        // 輔助函式
        // ============================================================
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        function getStudentId(student) { return `${student.grade}-${student.class}-${String(student.number).padStart(2, '0')}`; }
        function getChineseGrade(num) { const map = {'1':'一','2':'二','3':'三','4':'四','5':'五','6':'六'}; return map[num] || num; }
        function getChineseClass(num) { const map = {'1':'甲','2':'乙'}; return map[num] || num; }
        function formatClassName(grade, cls) { return `${getChineseGrade(grade)}年${getChineseClass(cls)}班`; }

        function setStatus(msg, color) {
            statusText.textContent = msg;
            statusBar.style.color = color || 'var(--text-secondary)';
        }

        function updateIdentityDisplay() {
            if (STATE.studentId?.startsWith('temp_')) {
                const seat = STATE.studentId.replace('temp_', '');
                identityText.textContent = `${t('studentChange')} ${seat}`;
            } else if (STATE.selectedClass) {
                const [g, c] = STATE.selectedClass.split('-');
                const seat = STATE.studentId?.split('-')[2] || '';
                identityText.textContent = `${formatClassName(g, c)} ${seat}號 ${STATE.studentName}`;
            }
        }

        // ============================================================
        // 載入名單
        // ============================================================
        async function loadRoster() {
            const url = 'https://script.google.com/macros/s/AKfycbyTN6NbWdLc-OfKoa_3iyX5uHCwpDuEeIYSRSVgFcE4aM3RHHfgJthaAMXoiul2YTkH6A/exec';
            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('網路請求失敗');
                const jsonData = await resp.json();
                const data = jsonData.data;
                if (!data) return;
                const roster = {}, all = [];
                for (const row of data) {
                    const grade = row.grade?.toString().trim();
                    const cls = row.class?.toString().trim();
                    const number = row.number?.toString().trim();
                    const name = row.name?.trim();
                    if (!grade || !cls || !number || !name) continue;
                    const className = `${grade}-${cls}`;
                    const student = { grade, class: cls, number, name };
                    if (!roster[className]) roster[className] = [];
                    roster[className].push(student);
                    all.push({ ...student, className });
                }
                for (const cls in roster) roster[cls].sort((a,b) => parseInt(a.number)-parseInt(b.number));
                STATE.rosterData = roster;
                STATE.allStudents = all;
            } catch (e) { console.warn('載入名單失敗', e); }
        }

        // ============================================================
        // 加入教室
        // ============================================================
        async function joinRoom() {
            const room = roomInput.value.trim();
            if (!room || !/^\d{4}$/.test(room)) {
                loginStatus.innerHTML = `<span style="color:var(--danger);">⚠️ ${t('studentRoomInput')}</span>`;
                return;
            }
            STATE.roomId = room;
            loginStatus.innerHTML = `<span>⏳ ${t('loading')}</span>`;

            try {
                const roomDoc = await getDoc(doc(db, 'rooms', STATE.roomId));
                if (!roomDoc.exists()) {
                    loginStatus.innerHTML = `<span style="color:var(--danger);">❌ ${t('errorNoRoom')}</span>`;
                    return;
                }
                const data = roomDoc.data();
                const selectedClasses = data.selectedClasses || [];
                const custom = data.customClassEnabled || false;

                classSelect.innerHTML = `<option value="">${t('studentSelectClass')}</option>`;
                classSelect.disabled = false;

                if (custom) { await autoJoinCustomRoom(data); return; }

                for (const cls of selectedClasses) {
                    const [g, c] = cls.split('-');
                    const label = formatClassName(g, c);
                    const opt = document.createElement('option');
                    opt.value = cls; opt.textContent = label;
                    classSelect.appendChild(opt);
                }
                classSelect.addEventListener('change', updateSeatDropdown);
                loginStatus.innerHTML = `<span>✅ ${t('studentLoginStatus')}</span>`;
                if (selectedClasses.length === 1) {
                    classSelect.value = selectedClasses[0];
                    classSelect.dispatchEvent(new Event('change'));
                }
            } catch (e) {
                loginStatus.innerHTML = `<span style="color:var(--danger);">❌ ${t('errorCreateRoom')}</span>`;
            }
        }

        function updateSeatDropdown() {
            const cls = classSelect.value;
            seatSelect.innerHTML = `<option value="">${t('studentSelectSeat')}</option>`;
            if (!cls) { seatSelect.disabled = true; return; }
            const roster = STATE.rosterData[cls] || [];
            for (const s of roster) {
                const opt = document.createElement('option');
                opt.value = s.number; opt.textContent = `${s.number} - ${s.name}`;
                seatSelect.appendChild(opt);
            }
            seatSelect.disabled = false;
            if (roster.length === 1) seatSelect.value = roster[0].number;
        }

        async function autoJoinCustomRoom(data) {
            const maxSeat = data.customStudentCount || 20;
            const studentsRef = collection(db, 'rooms', STATE.roomId, 'students');
            const snap = await getDocs(studentsRef);
            const used = [];
            snap.forEach(d => { if (d.data().tempSeat) used.push(d.data().tempSeat); });
            let seat = 1;
            while (used.includes(seat)) seat++;
            if (seat > maxSeat) {
                loginStatus.innerHTML = `<span style="color:var(--danger);">❌ ${t('errorNoStudents')}</span>`;
                return;
            }
            STATE.studentId = `temp_${seat}`;
            STATE.studentName = `${t('studentChange')} ${seat}`;
            STATE.selectedClass = 'custom';
            await registerStudent();
        }

        async function confirmJoin() {
            const cls = classSelect.value;
            const seat = seatSelect.value;
            if (!cls || !seat) {
                loginStatus.innerHTML = `<span style="color:var(--danger);">⚠️ ${t('studentLoginStatus')}</span>`;
                return;
            }
            const roster = STATE.rosterData[cls] || [];
            const found = roster.find(s => s.number === seat);
            if (!found) {
                loginStatus.innerHTML = `<span style="color:var(--danger);">⚠️ ${t('errorSeatInvalid')}</span>`;
                return;
            }
            STATE.studentId = getStudentId(found);
            STATE.studentName = found.name;
            STATE.selectedClass = cls;
            await registerStudent();
        }

        // ============================================================
        // 註冊學生（Firebase 寫入 1 次）
        // ============================================================
        async function registerStudent() {
            try {
                const studentRef = doc(db, 'rooms', STATE.roomId, 'students', STATE.studentId);
                const studentData = {
                    studentId: STATE.studentId,
                    name: STATE.studentName,
                    joinedAt: serverTimestamp(),
                    online: true,
                };
                if (STATE.selectedClass === 'custom') {
                    studentData.tempSeat = parseInt(STATE.studentId.replace('temp_', ''));
                }
                await setDoc(studentRef, studentData);

                STATE.isLoggedIn = true;
                loginScreen.classList.add('hidden');
                answerArea.classList.remove('hidden');
                submitArea.classList.remove('hidden');
                roomDisplay.textContent = STATE.roomId;
                updateIdentityDisplay();
                changeStudentBtn.disabled = false;

                lockScreen();
                listenTeacherCommands();
                listenMyAnswer();

                loginStatus.innerHTML = `<span style="color:var(--success);">✅ ${t('studentSubmitted')}</span>`;
            } catch (e) {
                loginStatus.innerHTML = `<span style="color:var(--danger);">❌ ${t('errorCreateRoom')}</span>`;
            }
        }

        // ============================================================
        // 更換學生
        // ============================================================
        async function changeStudent() {
            if (STATE.isAnswering && STATE.isLocked) { alert(t('errorNoAnswer')); return; }
            if (!confirm(t('studentChange'))) return;
            try { await deleteDoc(doc(db, 'rooms', STATE.roomId, 'students', STATE.studentId)); } catch (e) {}
            cleanupListeners();
            STATE.isLoggedIn = false;
            STATE.studentId = null; STATE.studentName = null;
            STATE.isLocked = false; STATE.isAnswering = false; STATE.myAnswer = null;
            STATE.voteActive = false; STATE.voteLocked = false;
            STATE.buzzActive = false; STATE.buzzLocked = false;
            answerArea.classList.add('hidden'); submitArea.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            classSelect.value = ''; seatSelect.innerHTML = `<option value="">${t('studentSelectSeat')}</option>`; seatSelect.disabled = true;
            loginStatus.innerHTML = `<span>🔄 ${t('studentLoginStatus')}</span>`;
            resetUI();
        }

        function cleanupListeners() {
            if (teacherCommandUnsub) { teacherCommandUnsub(); teacherCommandUnsub = null; }
            if (myAnswerUnsub) { myAnswerUnsub(); myAnswerUnsub = null; }
            if (voteListenerUnsub) { voteListenerUnsub(); voteListenerUnsub = null; }
            clearTimer(); clearBuzzTimer();
        }

        // ============================================================
        // 全螢幕鎖定
        // ============================================================
        function lockScreen() {
            try { const el = document.documentElement; if (el.requestFullscreen) el.requestFullscreen().catch(()=>{}); else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen(); } catch (e) {}
            document.addEventListener('touchmove', (e) => { if (document.fullscreenElement || document.webkitFullscreenElement) e.preventDefault(); }, { passive: false });
            document.addEventListener('keydown', (e) => { if ((e.key === 'F5' || (e.ctrlKey && e.key === 'r')) && (document.fullscreenElement || document.webkitFullscreenElement)) { e.preventDefault(); return false; } });
            window.addEventListener('beforeunload', (e) => { if (document.fullscreenElement || document.webkitFullscreenElement) { e.preventDefault(); e.returnValue = ''; } });
        }

        function resetUI() {
            choiceBtns.forEach(b => { b.classList.remove('selected'); b.disabled = true; });
            textInput.value = ''; textInput.disabled = true; charCount.textContent = '0 字';
            submitBtn.disabled = true; submitBtn.classList.remove('submitted');
            timerDisplay.textContent = '--'; timerDisplay.className = 'stu-timer';
            questionText.textContent = '等待教師出題...'; scoreDisplay.textContent = '1分';
            marqueeArea.classList.remove('active', 'scroll'); marqueeSpan.textContent = '';
            setStatus('等待教師開始');
        }

        // ============================================================
        // 監聽教師指令（核心，僅 1 個 onSnapshot）
        // ============================================================
        let teacherCommandUnsub = null;
        let voteListenerUnsub = null;

        function listenTeacherCommands() {
            if (teacherCommandUnsub) teacherCommandUnsub();
            const roomRef = doc(db, 'rooms', STATE.roomId);
            teacherCommandUnsub = onSnapshot(roomRef, async (snapshot) => {
                const data = snapshot.data();
                if (!data) return;

                // 鎖定畫面
                STATE.isScreenLocked = data.isLocked || false;
                if (STATE.isScreenLocked) {
                    disableAllInputs(true);
                    setStatus(t('studentScreenLocked'), 'var(--danger)');
                    return;
                }

                // 跑馬燈
                const msg = data.broadcastMsg?.trim() || '';
                if (msg) {
                    marqueeSpan.textContent = '📢 ' + msg;
                    marqueeArea.classList.add('active');
                    if (msg.length > 10) {
                        marqueeArea.classList.add('scroll');
                        marqueeSpan.addEventListener('animationend', function handler() {
                            marqueeArea.classList.remove('scroll', 'active');
                            marqueeSpan.textContent = '';
                            marqueeSpan.removeEventListener('animationend', handler);
                        }, { once: true });
                    } else {
                        marqueeArea.classList.remove('scroll');
                        clearTimeout(marqueeArea._timeout);
                        marqueeArea._timeout = setTimeout(() => {
                            marqueeArea.classList.remove('active');
                            marqueeSpan.textContent = '';
                        }, 8000);
                    }
                }

                // 題目
                STATE.currentQuestion = data.currentQuestion || 0;
                STATE.currentRoundId = data.currentRoundId || null;
                roundDisplay.textContent = t('studentRound').replace('{n}', STATE.currentQuestion);
                questionText.textContent = data.questionNote || (STATE.currentQuestion > 0 ? `第 ${STATE.currentQuestion} 題` : '等待教師出題...');
                STATE.questionType = data.questionType || 'choice';
                STATE.questionScore = data.questionScore || 1;
                scoreDisplay.textContent = `${STATE.questionScore}分`;

                // 搶答
                if (data.buzzActive) {
                    STATE.buzzActive = true;
                    STATE.buzzCountdown = data.buzzCountdown || 5;
                    if (!buzzModal.classList.contains('hidden')) return;
                    openBuzzModal(data.buzzCountdown);
                } else if (!data.buzzActive && STATE.buzzActive) {
                    STATE.buzzActive = false;
                    closeBuzzModal();
                }

                // 投票
                if (data.voteActive) {
                    STATE.voteActive = true;
                    STATE.voteOptions = data.voteOptions || [];
                    if (!voteModal.classList.contains('hidden')) return;
                    openVoteModal();
                } else if (!data.voteActive && STATE.voteActive) {
                    STATE.voteActive = false;
                    STATE.voteLocked = false;
                    voteModal.classList.add('hidden');
                }
                // 投票結果公布
                if (data.voteResults && !data.voteActive && STATE.voteLocked) {
                    showVoteResults(data.voteResults);
                }

                // 作答狀態
                if (data.isAnswering && !STATE.buzzActive && !STATE.voteActive) {
                    STATE.isAnswering = true;
                    enableInput(true);
                    if (data.timerSeconds) startTimer(data.timerSeconds);
                } else if (!data.buzzActive && !STATE.voteActive) {
                    STATE.isAnswering = false;
                    enableInput(false);
                    clearTimer();
                    if (!STATE.isLocked) setStatus(t('studentWaiting'));
                }

                // 公布答案
                if (data.revealedAnswer && STATE.questionType === 'choice') {
                    revealCorrectAnswer(data.revealedAnswer);
                }

                // 清除
                if (data.clearAll) {
                    STATE.myAnswer = null; STATE.isLocked = false;
                    STATE.voteLocked = false; STATE.buzzLocked = false;
                    resetUI(); enableInput(true);
                }
            });
        }

        // ============================================================
        // 監聽自己的答案（僅 1 個 onSnapshot）
        // ============================================================
        let myAnswerUnsub = null;
        function listenMyAnswer() {
            if (myAnswerUnsub) myAnswerUnsub();
            const ansRef = doc(db, 'rooms', STATE.roomId, 'answers', STATE.studentId);
            myAnswerUnsub = onSnapshot(ansRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    if (data.roundId === STATE.currentRoundId) {
                        STATE.myAnswer = { choice: data.choice || null, text: data.text || null };
                        STATE.isLocked = true;
                        if (data.choice) choiceBtns.forEach(b => b.classList.toggle('selected', b.dataset.choice === data.choice));
                        if (data.text) { textInput.value = data.text; charCount.textContent = data.text.length + ' 字'; }
                        setStatus('🔒 ' + t('studentLocked'), 'var(--success)');
                        enableInput(false);
                        submitBtn.disabled = true; submitBtn.classList.add('submitted');
                    }
                }
            });
        }

        // ============================================================
        // 輸入控制（動態顯示選擇/文字題）
        // ============================================================
        function enableInput(enabled) {
            const isChoice = (STATE.questionType === 'choice');
            if (isChoice) {
                choiceGrid.classList.remove('hidden');
                textInputWrap.classList.add('hidden');
                choiceBtns.forEach(b => { b.disabled = !enabled || STATE.isLocked; });
            } else {
                choiceGrid.classList.add('hidden');
                textInputWrap.classList.remove('hidden');
                textInput.disabled = !enabled || STATE.isLocked;
            }
            submitBtn.disabled = !enabled || STATE.isLocked;
            if (!enabled) { submitBtn.classList.add('submitted'); }
            else { submitBtn.classList.remove('submitted'); setStatus(t('studentAnswering'), 'var(--primary)'); }
        }

        function disableAllInputs(disabled) {
            choiceBtns.forEach(b => b.disabled = true);
            textInput.disabled = true; submitBtn.disabled = true;
            if (disabled) { submitBtn.classList.add('submitted'); setStatus('🔒 ' + t('studentScreenLocked'), 'var(--danger)'); }
        }

        // ============================================================
        // 計時器
        // ============================================================
        let timerInterval = null;
        function startTimer(seconds) {
            clearTimer();
            let remain = seconds;
            timerDisplay.textContent = remain + 's'; timerDisplay.className = 'stu-timer';
            timerInterval = setInterval(() => {
                remain--;
                timerDisplay.textContent = remain + 's';
                timerDisplay.className = remain <= 5 ? 'stu-timer urgent' : 'stu-timer';
                if (remain <= 0) { clearTimer(); timerDisplay.textContent = '⌛'; timerDisplay.className = 'stu-timer urgent'; }
            }, 1000);
        }
        function clearTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } timerDisplay.textContent = '--'; timerDisplay.className = 'stu-timer'; }

        // ============================================================
        // 送出答案（Firebase 寫入 1 次，防連點）
        // ============================================================
        let submitLock = false;
        async function submitAnswer() {
            if (submitLock) return;
            if (STATE.isLocked || STATE.isScreenLocked) return;
            if (!STATE.isAnswering) { alert(t('errorNotAnswering')); return; }
            const qType = STATE.questionType;
            let choice = '', text = '';
            if (qType === 'choice') {
                const selected = choiceGrid.querySelector('.choice-btn.selected');
                if (!selected) { alert(t('studentSelectSeat')); return; }
                choice = selected.dataset.choice;
            } else {
                text = textInput.value.trim();
                if (!text) { alert(t('studentAnswering')); return; }
            }
            submitLock = true;
            try {
                const ansRef = doc(db, 'rooms', STATE.roomId, 'answers', STATE.studentId);
                await setDoc(ansRef, { studentId: STATE.studentId, name: STATE.studentName, roundId: STATE.currentRoundId, choice, text, timestamp: serverTimestamp() });
                STATE.myAnswer = { choice, text }; STATE.isLocked = true;
                setStatus('✅ ' + t('studentSubmitted'), 'var(--success)');
                enableInput(false); submitBtn.disabled = true; submitBtn.classList.add('submitted');
            } catch (e) { alert('❌ ' + t('errorCreateRoom')); }
            finally { submitLock = false; }
        }

        // ============================================================
        // 公布答案
        // ============================================================
        function revealCorrectAnswer(answer) {
            choiceBtns.forEach(btn => {
                if (btn.dataset.choice === answer) btn.classList.add('correct');
                else if (btn.classList.contains('selected')) btn.classList.add('wrong');
            });
            setStatus(`📢 ${t('correct')}：${answer}`, 'var(--success)');
        }
                // ============================================================
        // 投票功能
        // ============================================================
        function openVoteModal() {
            STATE.voteLocked = false;
            voteModal.classList.remove('hidden');
            voteOptionsList.innerHTML = STATE.voteOptions.map(opt => 
                `<button class="vote-option-btn" data-option="${opt}">${opt}</button>`
            ).join('');
            
            // 選項點擊（可更改選擇）
            voteOptionsList.querySelectorAll('.vote-option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (STATE.voteLocked) return;
                    voteOptionsList.querySelectorAll('.vote-option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                });
            });

            voteSubmitBtn.disabled = false;
            voteSubmitBtn.onclick = async () => {
                if (STATE.voteLocked) return;
                const selected = voteOptionsList.querySelector('.vote-option-btn.selected');
                if (!selected) { alert('請選擇一個選項'); return; }
                STATE.voteLocked = true;
                voteSubmitBtn.disabled = true;
                
                // 寫入投票記錄（每個學生 1 次寫入）
                try {
                    const voteRef = doc(db, 'rooms', STATE.roomId, 'votes', STATE.studentId);
                    await setDoc(voteRef, {
                        studentId: STATE.studentId,
                        name: STATE.studentName,
                        option: selected.dataset.option,
                        timestamp: serverTimestamp(),
                    });
                    voteOptionsList.querySelectorAll('.vote-option-btn').forEach(b => b.disabled = true);
                    voteSubmitBtn.textContent = '✅ ' + t('voteSubmitted');
                } catch (e) {
                    console.warn('投票寫入失敗', e);
                    STATE.voteLocked = false;
                    voteSubmitBtn.disabled = false;
                }
            };

            voteCloseBtn.onclick = () => {
                voteModal.classList.add('hidden');
                if (!STATE.voteLocked) STATE.voteLocked = true; // 未投票關閉視為棄權
            };
        }

        function showVoteResults(results) {
            voteModal.classList.remove('hidden');
            const maxVotes = Math.max(...Object.values(results), 1);
            voteOptionsList.innerHTML = Object.entries(results).map(([option, count]) => {
                const pct = Math.round((count / maxVotes) * 100);
                const isTop = count === maxVotes && count > 0;
                return `<div style="display:flex; align-items:center; gap:8px; padding:4px 0;">
                    <span style="font-weight:600;">${isTop ? '👑 ' : ''}${option}</span>
                    <div style="flex:1; height:8px; background:rgba(0,0,0,0.05); border-radius:4px; overflow:hidden;">
                        <div style="width:${pct}%; height:100%; background:var(--primary); border-radius:4px;"></div>
                    </div>
                    <span style="font-weight:600;">${count}</span>
                </div>`;
            }).join('');
            voteSubmitBtn.style.display = 'none';
            voteCloseBtn.textContent = '關閉';
            voteCloseBtn.onclick = () => voteModal.classList.add('hidden');
            // 5 秒後自動關閉
            clearTimeout(window._voteResultTimer);
            window._voteResultTimer = setTimeout(() => voteModal.classList.add('hidden'), 5000);
        }

        // ============================================================
        // 搶答功能（彈窗版）
        // ============================================================
        function openBuzzModal(countdownSeconds) {
            STATE.buzzLocked = false;
            let remain = countdownSeconds;
            buzzModal.classList.remove('hidden');
            buzzCountdownDisplay.textContent = remain;
            buzzCountdownDisplay.style.color = 'var(--text-primary)';
            buzzBtn.disabled = true;
            buzzBtn.textContent = '⏳ ' + t('buzzCountdown');
            buzzBtn.style.background = 'rgba(255,255,255,0.5)';
            buzzBtn.style.color = 'var(--text-muted)';

            clearBuzzTimer();
            buzzTimerInterval = setInterval(() => {
                remain--;
                buzzCountdownDisplay.textContent = remain;
                if (remain <= 3) buzzCountdownDisplay.style.color = 'var(--danger)';
                if (remain <= 0) {
                    clearBuzzTimer();
                    buzzCountdownDisplay.textContent = '⚡';
                    buzzCountdownDisplay.style.color = 'var(--danger)';
                    // 啟用搶答按鈕
                    if (!STATE.buzzLocked) {
                        buzzBtn.disabled = false;
                        buzzBtn.textContent = '🔴 ' + t('buzzBtn');
                        buzzBtn.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
                        buzzBtn.style.color = 'white';
                    }
                }
            }, 1000);

            // 搶答按鈕事件（只允許點一次）
            buzzBtn.onclick = async () => {
                if (STATE.buzzLocked) return;
                STATE.buzzLocked = true;
                buzzBtn.disabled = true;
                buzzBtn.textContent = '✅ ' + t('buzzDone');
                buzzBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                buzzBtn.style.color = 'white';

                // 寫入搶答記錄（每個學生 1 次寫入）
                try {
                    const buzzRef = doc(db, 'rooms', STATE.roomId, 'buzzes', STATE.studentId);
                    await setDoc(buzzRef, {
                        studentId: STATE.studentId,
                        name: STATE.studentName,
                        timestamp: serverTimestamp(),
                    });
                } catch (e) {
                    console.warn('搶答寫入失敗', e);
                }
            };

            buzzCloseBtn.onclick = () => closeBuzzModal();
        }

        function closeBuzzModal() {
            clearBuzzTimer();
            buzzModal.classList.add('hidden');
            STATE.buzzActive = false;
            STATE.buzzLocked = true;
        }

        let buzzTimerInterval = null;
        function clearBuzzTimer() {
            if (buzzTimerInterval) { clearInterval(buzzTimerInterval); buzzTimerInterval = null; }
        }

        // ============================================================
        // 事件綁定
        // ============================================================
        joinRoomBtn.addEventListener('click', async () => {
            if (classSelect.value && seatSelect.value && !STATE.isLoggedIn) {
                await confirmJoin();
                return;
            }
            await joinRoom();
        });

        roomInput.addEventListener('input', () => {
            if (roomInput.value.length === 4 && /^\d{4}$/.test(roomInput.value)) {
                joinRoom();
            }
        });

        changeStudentBtn.addEventListener('click', changeStudent);

        choiceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (STATE.isLocked || !STATE.isAnswering || STATE.isScreenLocked) return;
                if (STATE.questionType !== 'choice') return;
                choiceBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });

        textInput.addEventListener('input', () => {
            charCount.textContent = textInput.value.length + ' 字';
        });

        submitBtn.addEventListener('click', submitAnswer);

        // 防止不當手勢（下拉刷新、雙擊縮放等）
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('gesturechange', (e) => e.preventDefault());
        document.addEventListener('gestureend', (e) => e.preventDefault());
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        // 防止意外離開
        window.addEventListener('beforeunload', (e) => {
            if (STATE.isLoggedIn && STATE.isAnswering) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // ============================================================
        // 初始化
        // ============================================================
        async function init() {
            await loadRoster();

            const urlParams = new URLSearchParams(window.location.search);
            const roomFromUrl = urlParams.get('room');
            if (roomFromUrl && /^\d{4}$/.test(roomFromUrl)) {
                roomInput.value = roomFromUrl;
                setTimeout(() => joinRoom(), 300);
            }

            updateAllTexts();
            console.log('📝 學生端 v4.1 已啟動！');
        }

        init();
    </script>
</body>
</html>
