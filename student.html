<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>霧臺國小 - 學生作答</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Firebase SDK -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"
            }
        }
    </script>

    <style>
        /* ============================================================
           全域變數 (與教師端一致)
           ============================================================ */
        :root {
            --color-primary: #1a5c9e;
            --color-primary-dark: #12447a;
            --color-success: #1f8b5c;
            --color-success-light: #e6f5e6;
            --color-danger: #c73d3d;
            --color-danger-light: #fde8e8;
            --color-warning: #d68d2c;
            --color-text-primary: #0b2b4a;
            --color-text-secondary: #4a6a8a;
            --color-text-muted: #8899aa;
            --color-bg: #f0f4f9;
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 32px;
            --radius-full: 9999px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.06);
            --transition: 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang TC', system-ui, sans-serif;
            background: var(--color-bg);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* ===== 主容器 ===== */
        .exam-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 10px 16px 14px 16px;
            max-width: 800px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        /* ===== 頂部 ===== */
        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
            min-height: 44px;
        }

        .exam-header .identity {
            font-size: 17px;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .exam-header .identity .change-btn {
            font-size: 12px;
            font-weight: 400;
            color: var(--color-primary);
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            margin-left: 8px;
            padding: 2px 6px;
            opacity: 0.6;
            transition: var(--transition);
        }

        .exam-header .identity .change-btn:hover {
            opacity: 1;
        }

        .exam-header .identity .change-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            text-decoration: none;
        }

        .exam-header .room-id {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text-muted);
            letter-spacing: 1px;
            background: transparent;
            padding: 2px 8px;
        }

        .exam-header .round {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
            background: rgba(0, 0, 0, 0.04);
            padding: 3px 12px;
            border-radius: var(--radius-full);
        }

        /* ===== 跑馬燈（固定高度 14%） ===== */
        .exam-marquee {
            flex-shrink: 0;
            height: 14%;
            min-height: 44px;
            max-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--color-danger);
            background: transparent;
            border-radius: var(--radius-sm);
            margin: 4px 0 6px 0;
            padding: 0 16px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            transition: var(--transition);
        }

        .exam-marquee.active {
            background: var(--color-danger-light);
            color: var(--color-danger);
        }

        /* ===== 題目區 ===== */
        .exam-question {
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            border-left: 4px solid var(--color-primary);
            margin-bottom: 6px;
            min-height: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
        }

        .exam-question .q-label {
            font-weight: 600;
            color: var(--color-primary);
            flex-shrink: 0;
            font-size: 16px;
        }

        .exam-question .q-text {
            font-size: 16px;
            font-weight: 500;
            color: var(--color-text-primary);
            word-break: break-word;
            line-height: 1.4;
            flex: 1;
        }

        .exam-question .q-score {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-success);
            background: var(--color-success-light);
            padding: 2px 12px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
        }

        /* ===== 計時器 ===== */
        .exam-timer {
            flex-shrink: 0;
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            color: var(--color-primary);
            padding: 0 0 4px 0;
            letter-spacing: 2px;
            min-height: 40px;
            transition: var(--transition);
            text-shadow: 0 2px 12px rgba(26, 92, 158, 0.08);
        }

        .exam-timer.urgent {
            color: var(--color-danger);
            animation: blink 0.5s ease infinite alternate;
        }

        @keyframes blink {
            from {
                opacity: 1;
            }
            to {
                opacity: 0.2;
            }
        }

        /* ===== 作答區 ===== */
        .exam-answer-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        /* 選擇題按鈕 */
        .choice-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            flex-shrink: 0;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(0, 0, 0, 0.06);
            border-radius: var(--radius-sm);
            padding: 12px 4px;
            font-size: 28px;
            font-weight: 700;
            color: var(--color-text-primary);
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            touch-action: manipulation;
            min-height: 52px;
            box-shadow: var(--shadow-sm);
        }

        .choice-btn:active {
            transform: scale(0.94);
        }

        .choice-btn.selected {
            border-color: var(--color-primary);
            background: rgba(26, 92, 158, 0.08);
            box-shadow: 0 0 0 3px rgba(26, 92, 158, 0.08);
        }

        .choice-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* 文字輸入 */
        .text-input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 0;
        }

        .text-input-wrapper textarea {
            flex: 1;
            width: 100%;
            padding: 10px 14px;
            border: 2px solid rgba(0, 0, 0, 0.06);
            border-radius: var(--radius-sm);
            font-size: 17px;
            font-family: inherit;
            resize: none;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            transition: var(--transition);
            min-height: 56px;
            line-height: 1.5;
        }

        .text-input-wrapper textarea:focus {
            border-color: var(--color-primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 92, 158, 0.08);
            background: white;
        }

        .text-input-wrapper textarea:disabled {
            background: rgba(255, 255, 255, 0.3);
            opacity: 0.6;
        }

        .text-input-wrapper .char-count {
            text-align: right;
            font-size: 12px;
            color: var(--color-text-muted);
            flex-shrink: 0;
        }

        /* ===== 送出按鈕 ===== */
        .exam-submit {
            flex-shrink: 0;
            padding: 4px 0 2px 0;
        }

        .exam-submit button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 18px;
            font-weight: 700;
            background: var(--color-primary);
            color: white;
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
            box-shadow: 0 4px 14px rgba(26, 92, 158, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .exam-submit button:active {
            transform: scale(0.96);
        }

        .exam-submit button:disabled {
            opacity: 0.4;
            pointer-events: none;
            transform: none;
        }

        .exam-submit button.submitted {
            background: var(--color-success);
        }

        .exam-submit button.locked {
            background: var(--color-text-muted);
        }

        /* ===== 狀態訊息 ===== */
        .exam-status {
            flex-shrink: 0;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--color-success);
            background: var(--color-success-light);
            border-radius: var(--radius-full);
            padding: 5px 16px;
            margin-top: 2px;
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .exam-status.waiting {
            color: var(--color-warning);
            background: #fef3e0;
        }

        .exam-status.locked {
            color: var(--color-danger);
            background: var(--color-danger-light);
        }

        .exam-status.screen-locked {
            color: var(--color-text-secondary);
            background: rgba(0, 0, 0, 0.04);
        }

        .exam-status.error {
            color: var(--color-danger);
            background: var(--color-danger-light);
        }

        .exam-status.ready {
            color: var(--color-success);
            background: var(--color-success-light);
        }

        /* ===== 登入畫面 ===== */
        .login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 16px;
        }

        .login-screen .title {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 4px;
        }

        .login-screen .title i {
            color: var(--color-primary);
            margin-right: 8px;
        }

        .login-screen .subtitle {
            font-size: 15px;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }

        .login-screen .room-input-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 380px;
        }

        .login-screen .room-input-area input {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border: 2px solid rgba(0, 0, 0, 0.06);
            border-radius: var(--radius-full);
            font-size: 20px;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            transition: var(--transition);
        }

        .login-screen .room-input-area input:focus {
            border-color: var(--color-primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 92, 158, 0.08);
            background: white;
        }

        .login-screen .class-select-area {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .login-screen .class-select-area select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(0, 0, 0, 0.06);
            border-radius: var(--radius-full);
            font-size: 16px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            transition: var(--transition);
            color: var(--color-text-primary);
        }

        .login-screen .class-select-area select:focus {
            border-color: var(--color-primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 92, 158, 0.08);
            background: white;
        }

        .login-screen .btn-join {
            padding: 14px 48px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 18px;
            font-weight: 700;
            background: var(--color-primary);
            color: white;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(26, 92, 158, 0.2);
            min-width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-screen .btn-join:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .login-screen .btn-join:disabled {
            opacity: 0.4;
            pointer-events: none;
            transform: none;
        }

        /* ===== 廣播 Modal ===== */
        .broadcast-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
        }

        .broadcast-modal-overlay.show {
            display: flex;
        }

        .broadcast-modal-overlay .modal-content {
            max-width: 95%;
            max-height: 95%;
            position: relative;
        }

        .broadcast-modal-overlay .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            object-fit: contain;
        }

        .broadcast-modal-overlay .modal-content .close-hint {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }

        /* ===== 隱藏 ===== */
        .hidden {
            display: none !important;
        }

        /* ===== RWD ===== */
        @media (max-width: 480px) {
            .exam-container {
                padding: 6px 10px 10px 10px;
            }
            .exam-header .identity {
                font-size: 15px;
            }
            .exam-header .room-id {
                font-size: 11px;
            }
            .exam-header .round {
                font-size: 11px;
                padding: 2px 8px;
            }
            .exam-marquee {
                font-size: 20px;
                min-height: 36px;
                height: 12%;
            }
            .exam-question .q-text {
                font-size: 14px;
            }
            .exam-question .q-score {
                font-size: 12px;
                padding: 1px 10px;
            }
            .exam-timer {
                font-size: 24px;
                min-height: 34px;
            }
            .choice-btn {
                font-size: 22px;
                min-height: 44px;
                padding: 8px 4px;
            }
            .text-input-wrapper textarea {
                font-size: 15px;
                min-height: 44px;
                padding: 8px 12px;
            }
            .exam-submit button {
                font-size: 16px;
                padding: 12px;
            }
            .exam-status {
                font-size: 13px;
                padding: 4px 12px;
                min-height: 30px;
            }
            .login-screen .title {
                font-size: 20px;
            }
            .login-screen .room-input-area input {
                font-size: 18px;
                padding: 10px 14px;
            }
            .login-screen .btn-join {
                font-size: 16px;
                padding: 12px 32px;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .exam-container {
                padding: 4px 12px 6px 12px;
            }
            .exam-header .identity {
                font-size: 14px;
            }
            .exam-marquee {
                font-size: 18px;
                min-height: 30px;
                height: 10%;
            }
            .exam-timer {
                font-size: 20px;
                min-height: 28px;
                padding: 0;
            }
            .choice-btn {
                font-size: 18px;
                min-height: 34px;
                padding: 4px 4px;
            }
            .text-input-wrapper textarea {
                min-height: 34px;
                font-size: 14px;
                padding: 4px 10px;
            }
            .exam-submit button {
                font-size: 14px;
                padding: 8px;
            }
            .exam-question {
                padding: 4px 12px;
                min-height: 32px;
            }
            .exam-question .q-text {
                font-size: 13px;
            }
            .exam-status {
                font-size: 12px;
                padding: 3px 10px;
                min-height: 26px;
            }
        }
    </style>
</head>
<body>

    <div class="exam-container" id="app">

        <!-- ===== 頂部 ===== -->
        <div class="exam-header">
            <span class="identity" id="studentIdentity">
                <span id="identityText">--</span>
                <button class="change-btn" id="changeStudentBtn" disabled><i class="fa-regular fa-rotate-right" style="margin-right:4px;"></i>更換</button>
            </span>
            <span class="room-id" id="roomIdDisplay">----</span>
            <span class="round" id="studentRound"><i class="fa-regular fa-hashtag" style="margin-right:4px;"></i>題號：--</span>
        </div>

        <!-- ===== 跑馬燈 ===== -->
        <div class="exam-marquee" id="marqueeArea"></div>

        <!-- ===== 題目區 ===== -->
        <div class="exam-question" id="questionArea">
            <span class="q-label"><i class="fa-regular fa-book-open"></i></span>
            <span class="q-text" id="questionText">等待教師出題...</span>
            <span class="q-score" id="questionScore"><i class="fa-regular fa-star"></i> 1分</span>
        </div>

        <!-- ===== 計時器 ===== -->
        <div class="exam-timer" id="timerDisplay">--</div>

        <!-- ===== 作答區 ===== -->
        <div class="exam-answer-area" id="answerArea">
            <!-- 選擇題按鈕 -->
            <div class="choice-grid" id="choiceGrid">
                <button class="choice-btn" data-choice="A" disabled>A</button>
                <button class="choice-btn" data-choice="B" disabled>B</button>
                <button class="choice-btn" data-choice="C" disabled>C</button>
                <button class="choice-btn" data-choice="D" disabled>D</button>
            </div>

            <!-- 文字輸入 -->
            <div class="text-input-wrapper" id="textInputWrapper">
                <textarea id="textInput" placeholder="請在此輸入你的答案..." disabled></textarea>
                <div class="char-count" id="charCount">0 字</div>
            </div>

            <!-- 送出按鈕 -->
            <div class="exam-submit">
                <button id="submitBtn" disabled>
                    <i class="fa-regular fa-paper-plane"></i> 送出答案
                </button>
            </div>

            <!-- 狀態訊息 -->
            <div class="exam-status waiting" id="statusMessage">
                <i class="fa-regular fa-clock" style="margin-right:6px;"></i>等待教師開始作答
            </div>
        </div>

        <!-- ===== 登入畫面 ===== -->
        <div class="login-screen" id="loginScreen">
            <div class="title"><i class="fa-regular fa-school"></i>霧臺國小</div>
            <div class="subtitle">請輸入教室代碼並選擇座號</div>
            <div class="room-input-area">
                <input type="text" id="roomInput" placeholder="4 位數代碼" maxlength="4" inputmode="numeric" />
                <button class="btn-join" id="joinRoomBtn"><i class="fa-regular fa-door-open"></i> 加入教室</button>
            </div>
            <div class="class-select-area">
                <select id="classSelect" disabled>
                    <option value="">-- 請先加入教室 --</option>
                </select>
                <select id="studentSelect" disabled>
                    <option value="">-- 請選擇座號 --</option>
                </select>
            </div>
            <div style="font-size:14px; color:var(--color-text-muted); text-align:center; margin-top:4px;" id="loginStatus">
                輸入教室代碼後加入
            </div>
        </div>

        <!-- ===== 廣播 Modal ===== -->
        <div class="broadcast-modal-overlay" id="broadcastModalOverlay">
            <div class="modal-content">
                <img id="broadcastImage" src="" alt="廣播圖片" />
                <div class="close-hint"><i class="fa-regular fa-hand-pointer"></i> 點擊任意處關閉</div>
            </div>
        </div>

    </div>

    <script type="module">
        // ============================================================
        // 1. Firebase 初始化
        // ============================================================
        import { initializeApp } from "firebase/app";
        import {
            getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc,
            collection, query, where, onSnapshot, getDocs, writeBatch,
            serverTimestamp, increment, addDoc, runTransaction
        } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyAVllhBuONIqLlPlvCgnozPEE2834HFTxA",
            authDomain: "classqna-7898b.firebaseapp.com",
            projectId: "classqna-7898b",
            storageBucket: "classqna-7898b.firebasestorage.app",
            messagingSenderId: "145272240036",
            appId: "1:145272240036:web:3a286ec303c476066df331"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // 2. 全域狀態
        // ============================================================
        const STATE = {
            roomId: null,
            studentId: null,
            studentName: null,
            currentQuestion: 0,
            currentRoundId: null,
            isAnswering: false,
            questionType: 'choice',
            questionScore: 1,
            isLocked: false,
            isScreenLocked: false,
            myAnswer: null,
            timerInterval: null,
            timerSeconds: 0,
            rosterData: {},
            allStudents: [],
            selectedClass: '',
            selectedSeat: '',
            isLoggedIn: false,
        };

        // ============================================================
        // 3. DOM 參照
        // ============================================================
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const identityText = $('#identityText');
        const changeStudentBtn = $('#changeStudentBtn');
        const roomIdDisplay = $('#roomIdDisplay');
        const studentRound = $('#studentRound');
        const marqueeArea = $('#marqueeArea');
        const questionText = $('#questionText');
        const questionScore = $('#questionScore');
        const timerDisplay = $('#timerDisplay');
        const choiceGrid = $('#choiceGrid');
        const choiceBtns = choiceGrid.querySelectorAll('.choice-btn');
        const textInput = $('#textInput');
        const charCount = $('#charCount');
        const submitBtn = $('#submitBtn');
        const statusMessage = $('#statusMessage');
        const answerArea = $('#answerArea');
        const loginScreen = $('#loginScreen');

        const roomInput = $('#roomInput');
        const joinRoomBtn = $('#joinRoomBtn');
        const classSelect = $('#classSelect');
        const studentSelect = $('#studentSelect');
        const loginStatus = $('#loginStatus');

        const broadcastModalOverlay = $('#broadcastModalOverlay');
        const broadcastImage = $('#broadcastImage');

        // ============================================================
        // 4. 輔助函式
        // ============================================================
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function getStudentId(student) { return `${student.grade}-${student.class}-${String(student.number).padStart(2, '0')}`; }

        function getChineseGrade(num) { const map = { '1': '一', '2': '二', '3': '三', '4': '四', '5': '五', '6': '六' }; return map[
                num] || num; }

        function getChineseClass(num) { const map = { '1': '甲', '2': '乙' }; return map[num] || num; }

        function formatClassName(grade, cls) { return `${getChineseGrade(grade)}年${getChineseClass(cls)}班`; }

        function setStatus(msg, type = 'waiting') {
            statusMessage.innerHTML = msg;
            statusMessage.className = 'exam-status ' + type;
        }

        function resetUI() {
            choiceBtns.forEach(b => {
                b.classList.remove('selected');
                b.disabled = true;
            });
            textInput.value = '';
            textInput.disabled = true;
            charCount.textContent = '0 字';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-regular fa-paper-plane"></i> 送出答案';
            submitBtn.className = '';
            timerDisplay.textContent = '--';
            timerDisplay.className = 'exam-timer';
            setStatus('<i class="fa-regular fa-clock" style="margin-right:6px;"></i>等待教師開始作答', 'waiting');
            questionText.textContent = '等待教師出題...';
            questionScore.innerHTML = '<i class="fa-regular fa-star"></i> 1分';
            studentRound.innerHTML = '<i class="fa-regular fa-hashtag" style="margin-right:4px;"></i>題號：--';
            marqueeArea.textContent = '';
            marqueeArea.className = 'exam-marquee';
        }

        // ============================================================
        // 5. 載入名單
        // ============================================================
        async function loadRoster() {
            const url =
                'https://script.google.com/macros/s/AKfycbyTN6NbWdLc-OfKoa_3iyX5uHCwpDuEeIYSRSVgFcE4aM3RHHfgJthaAMXoiul2YTkH6A/exec';
            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('網路請求失敗');
                const jsonData = await resp.json();
                const data = jsonData.data;
                if (!data) return;
                const roster = {};
                const all = [];
                for (const row of data) {
                    const grade = row.grade?.toString().trim();
                    const cls = row.class?.toString().trim();
                    const number = row.number?.toString().trim();
                    const name = row.name?.trim();
                    if (!grade || !cls || !number || !name) continue;
                    const className = `${grade}-${cls}`;
                    const student = { grade, class: cls, number, name };
                    if (!roster[className]) roster[className] = [];
                    roster[className].push(student);
                    all.push({ ...student, className });
                }
                STATE.rosterData = roster;
                STATE.allStudents = all;
                console.log(`📚 載入 ${all.length} 位學生`);
            } catch (e) {
                console.warn('載入名單失敗', e);
            }
        }

        // ============================================================
        // 6. 登入 / 加入教室
        // ============================================================
        async function joinRoom() {
            const room = roomInput.value.trim();
            if (!room || !/^\d{4}$/.test(room)) {
                loginStatus.textContent = '⚠️ 請輸入 4 位數教室代碼';
                return;
            }
            STATE.roomId = room;
            loginStatus.textContent = '⏳ 檢查教室...';

            try {
                const roomDoc = await getDoc(doc(db, 'rooms', STATE.roomId));
                if (!roomDoc.exists()) {
                    loginStatus.textContent = '❌ 教室不存在，請確認代碼';
                    return;
                }

                const data = roomDoc.data();
                const selectedClasses = data.selectedClasses || [];
                const custom = data.customClassEnabled || false;

                classSelect.innerHTML = '<option value="">-- 請選擇班級 --</option>';
                classSelect.disabled = false;

                if (custom) {
                    await autoJoinCustomRoom(data);
                    return;
                }

                for (const cls of selectedClasses) {
                    const [g, c] = cls.split('-');
                    const label = formatClassName(g, c);
                    const opt = document.createElement('option');
                    opt.value = cls;
                    opt.textContent = label;
                    classSelect.appendChild(opt);
                }

                if (selectedClasses.length === 0) {
                    loginStatus.textContent = '⚠️ 此教室尚未設定班級';
                    return;
                }

                classSelect.disabled = false;
                classSelect.addEventListener('change', updateStudentDropdown);
                loginStatus.textContent = '✅ 請選擇班級與座號';

                classSelect.selectedIndex = 1;
                classSelect.dispatchEvent(new Event('change'));

            } catch (e) {
                loginStatus.textContent = '❌ 加入失敗：' + e.message;
                console.error(e);
            }
        }

        function updateStudentDropdown() {
            const cls = classSelect.value;
            if (!cls) {
                studentSelect.innerHTML = '<option value="">-- 請先選擇班級 --</option>';
                studentSelect.disabled = true;
                return;
            }
            const roster = STATE.rosterData[cls] || [];
            studentSelect.innerHTML = '<option value="">-- 請選擇座號 --</option>';
            for (const s of roster) {
                const opt = document.createElement('option');
                opt.value = s.number;
                opt.textContent = `${s.number} - ${s.name}`;
                studentSelect.appendChild(opt);
            }
            studentSelect.disabled = false;
            loginStatus.textContent = `✅ 請選擇座號（${roster.length} 位學生）`;
        }

        async function confirmJoin() {
            const cls = classSelect.value;
            const seat = studentSelect.value;
            if (!cls || !seat) {
                loginStatus.textContent = '⚠️ 請選擇班級與座號';
                return;
            }
            const roster = STATE.rosterData[cls] || [];
            const found = roster.find(s => s.number === seat);
            if (!found) {
                loginStatus.textContent = '⚠️ 座號無效';
                return;
            }

            STATE.studentId = getStudentId(found);
            STATE.studentName = found.name;
            STATE.selectedClass = cls;

            await registerStudent();
        }

        async function autoJoinCustomRoom(data) {
            const maxSeat = data.customStudentCount || 20;
            const studentsRef = collection(db, 'rooms', STATE.roomId, 'students');
            const snap = await getDocs(studentsRef);
            const used = [];
            snap.forEach(d => {
                const dta = d.data();
                if (dta.tempSeat) used.push(dta.tempSeat);
            });
            let seat = 1;
            while (used.includes(seat)) seat++;
            if (seat > maxSeat) {
                loginStatus.textContent = '❌ 已達人數上限';
                return;
            }
            STATE.studentId = `temp_${seat}`;
            STATE.studentName = `臨時${seat}號`;
            STATE.selectedClass = 'custom';
            await registerStudent();
        }

        // ============================================================
        // 7. 註冊學生（升級版後蓋前）
        // ============================================================
        async function registerStudent() {
            try {
                const studentRef = doc(db, 'rooms', STATE.roomId, 'students', STATE.studentId);
                const studentSnap = await getDoc(studentRef);

                if (studentSnap.exists()) {
                    const existingData = studentSnap.data();
                    if (existingData.studentId && existingData.studentId !== STATE.studentId) {
                        loginStatus.textContent = '❌ 此座號已被其他學生使用，請確認座號是否正確。';
                        return;
                    }
                }

                const studentData = {
                    studentId: STATE.studentId,
                    name: STATE.studentName,
                    joinedAt: serverTimestamp(),
                    online: true,
                };
                if (STATE.selectedClass === 'custom') {
                    const seat = STATE.studentId.replace('temp_', '');
                    studentData.tempSeat = parseInt(seat);
                } else {
                    const [grade, cls] = STATE.selectedClass.split('-');
                    const roster = STATE.rosterData[STATE.selectedClass] || [];
                    const found = roster.find(s => s.number === STATE.studentId.split('-')[2]);
                    if (found) {
                        studentData.class = STATE.selectedClass;
                        studentData.grade = found.grade;
                        studentData.classNum = found.class;
                        studentData.number = found.number;
                    }
                }
                await setDoc(studentRef, studentData);

                STATE.isLoggedIn = true;
                loginScreen.classList.add('hidden');
                answerArea.classList.remove('hidden');
                roomIdDisplay.textContent = STATE.roomId;

                identityText.textContent = STATE.studentId.startsWith('temp_') ?
                    `臨時${STATE.studentId.replace('temp_', '')}號` :
                    `${formatClassName(STATE.selectedClass.split('-')[0], STATE.selectedClass.split('-')[1])} - ${STATE.studentId.split('-')[2]}號 ${STATE.studentName}`;
                changeStudentBtn.disabled = false;

                lockScreen();
                listenTeacherCommands();
                listenMyAnswer();

                loginStatus.textContent = '✅ 已加入教室！';

            } catch (e) {
                loginStatus.textContent = '❌ 註冊失敗：' + e.message;
                console.error(e);
            }
        }

        // ============================================================
        // 8. 更換學生
        // ============================================================
        async function changeStudent() {
            if (STATE.isAnswering && STATE.isLocked) {
                alert('作答中無法更換學生，請等待教師結束本題。');
                return;
            }
            if (!confirm('確定要更換學生嗎？\n你將回到登入畫面重新選擇。')) return;

            try {
                await deleteDoc(doc(db, 'rooms', STATE.roomId, 'students', STATE.studentId));
            } catch (e) { /* 可能已經不存在 */ }

            STATE.isLoggedIn = false;
            STATE.studentId = null;
            STATE.studentName = null;
            STATE.currentRoundId = null;
            STATE.isLocked = false;
            STATE.isAnswering = false;
            STATE.myAnswer = null;

            answerArea.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            loginStatus.textContent = '🔄 請重新選擇座號';
            classSelect.value = '';
            studentSelect.innerHTML = '<option value="">-- 請選擇座號 --</option>';
            studentSelect.disabled = true;

            if (teacherCommandUnsub) teacherCommandUnsub();
            if (myAnswerUnsub) myAnswerUnsub();

            resetUI();
        }

        // ============================================================
        // 9. 全螢幕鎖定
        // ============================================================
        function lockScreen() {
            try {
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            } catch (e) {}

            document.addEventListener('touchmove', (e) => {
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    e.preventDefault();
                }
            }, { passive: false });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
                    if (document.fullscreenElement || document.webkitFullscreenElement) {
                        e.preventDefault();
                        return false;
                    }
                }
            });

            window.addEventListener('beforeunload', (e) => {
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    e.preventDefault();
                    e.returnValue = '確定要離開教室嗎？';
                }
            });
        }

        // ============================================================
        // 10. 監聽教師指令
        // ============================================================
        let teacherCommandUnsub = null;

        function listenTeacherCommands() {
            if (teacherCommandUnsub) teacherCommandUnsub();
            const roomRef = doc(db, 'rooms', STATE.roomId);
            teacherCommandUnsub = onSnapshot(roomRef, async (snapshot) => {
                const data = snapshot.data();
                if (!data) return;

                const isScreenLocked = data.isLocked || false;
                STATE.isScreenLocked = isScreenLocked;
                if (isScreenLocked) {
                    setStatus('<i class="fa-regular fa-lock" style="margin-right:6px;"></i>教師已鎖定畫面', 'screen-locked');
                    disableAllInputs(true);
                    return;
                } else {
                    if (!STATE.isLocked && STATE.isAnswering) {
                        setStatus('<i class="fa-regular fa-pen" style="margin-right:6px;"></i>請作答', 'ready');
                    }
                    disableAllInputs(false);
                }

                if (data.broadcastMsg && data.broadcastMsg.trim()) {
                    marqueeArea.textContent = '📢 ' + data.broadcastMsg;
                    marqueeArea.className = 'exam-marquee active';
                    setTimeout(() => {
                        marqueeArea.textContent = '';
                        marqueeArea.className = 'exam-marquee';
                    }, 8000);
                }

                const qNum = data.currentQuestion || 0;
                const roundId = data.currentRoundId || null;
                STATE.currentQuestion = qNum;
                STATE.currentRoundId = roundId;
                studentRound.innerHTML = `<i class="fa-regular fa-hashtag" style="margin-right:4px;"></i>題號：${qNum}`;

                const note = data.questionNote || '';
                questionText.textContent = note || (qNum > 0 ? `第 ${qNum} 題` : '等待教師出題...');

                const qType = data.questionType || 'choice';
                STATE.questionType = qType;

                const score = data.questionScore || 1;
                STATE.questionScore = score;
                questionScore.innerHTML = `<i class="fa-regular fa-star"></i> ${score}分`;

                if (data.isAnswering === true) {
                    STATE.isAnswering = true;
                    enableInput(true, qType);
                    if (data.timerSeconds) {
                        startTimer(data.timerSeconds);
                    }
                    if (STATE.myAnswer) {
                        lockInput();
                    }
                } else {
                    STATE.isAnswering = false;
                    enableInput(false, qType);
                    clearTimer();
                    if (!STATE.isLocked) {
                        setStatus('<i class="fa-regular fa-clock" style="margin-right:6px;"></i>等待教師開始作答', 'waiting');
                    }
                }

                if (data.revealedAnswer) {
                    if (qType === 'choice') {
                        setStatus(`📢 正確答案：${data.revealedAnswer}`, 'ready');
                        choiceBtns.forEach(btn => {
                            if (btn.dataset.choice === data.revealedAnswer) {
                                btn.style.borderColor = '#1f8b5c';
                                btn.style.background = '#e6f5e6';
                            } else if (btn.dataset.choice === STATE.myAnswer?.choice) {
                                btn.style.borderColor = '#c73d3d';
                                btn.style.background = '#fde8e8';
                            }
                        });
                    } else {
                        setStatus('📢 教師已公布答案，請查看結果', 'ready');
                    }
                } else {
                    choiceBtns.forEach(btn => {
                        btn.style.borderColor = '';
                        btn.style.background = '';
                    });
                    if (!STATE.isLocked && !STATE.isAnswering) {
                        setStatus('<i class="fa-regular fa-clock" style="margin-right:6px;"></i>等待教師開始作答', 'waiting');
                    } else if (!STATE.isLocked && STATE.isAnswering) {
                        setStatus('<i class="fa-regular fa-pen" style="margin-right:6px;"></i>請作答', 'ready');
                    }
                }

                if (data.clearAll === true) {
                    STATE.myAnswer = null;
                    STATE.isLocked = false;
                    choiceBtns.forEach(b => b.classList.remove('selected'));
                    textInput.value = '';
                    charCount.textContent = '0 字';
                    setStatus('<i class="fa-regular fa-rotate-right" style="margin-right:6px;"></i>已清除，請重新作答', 'ready');
                    enableInput(true, qType);
                    await updateDoc(doc(db, 'rooms', STATE.roomId), { clearAll: false });
                }

                const specified = data.specifiedStudents || [];
                if (specified.includes(STATE.studentId) && !STATE.isLocked && STATE.isAnswering) {
                    setStatus('<i class="fa-regular fa-hand-point-right" style="margin-right:6px;"></i>老師點名你回答！', 'ready');
                }

            }, (err) => {
                console.warn('監聽失敗', err);
            });
        }

        // ============================================================
        // 11. 監聽自己的答案
        // ============================================================
        let myAnswerUnsub = null;

        function listenMyAnswer() {
            if (myAnswerUnsub) myAnswerUnsub();
            const ansRef = doc(db, 'rooms', STATE.roomId, 'answers', STATE.studentId);
            myAnswerUnsub = onSnapshot(ansRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    if (data.roundId === STATE.currentRoundId) {
                        STATE.myAnswer = { choice: data.choice || null, text: data.text || null };
                        STATE.isLocked = true;
                        if (data.choice) {
                            choiceBtns.forEach(b => {
                                b.classList.toggle('selected', b.dataset.choice === data.choice);
                            });
                        }
                        if (data.text) {
                            textInput.value = data.text;
                            charCount.textContent = data.text.length + ' 字';
                        }
                        setStatus('<i class="fa-regular fa-lock" style="margin-right:6px;"></i>已送出答案（鎖定）', 'locked');
                        enableInput(false, STATE.questionType);
                        submitBtn.innerHTML = '<i class="fa-regular fa-check-circle"></i> 已送出';
                        submitBtn.className = 'submitted';
                    }
                }
            }, (err) => { console.warn('監聽答案失敗', err); });
        }

        // ============================================================
        // 12. 啟用/禁用輸入
        // ============================================================
        function enableInput(enabled, type) {
            const isChoice = (type === 'choice');

            choiceBtns.forEach(b => {
                b.disabled = !enabled || !isChoice;
            });

            textInput.disabled = !enabled || isChoice;
            if (enabled && !isChoice) {
                textInput.placeholder = '請輸入你的文字答案...';
                textInput.style.borderColor = '#2b7be4';
            } else {
                textInput.placeholder = isChoice ? '（請點選上方的 A/B/C/D）' : '輸入文字答案...';
                textInput.style.borderColor = 'rgba(0,0,0,0.06)';
            }

            submitBtn.disabled = !enabled;
            if (!enabled) {
                submitBtn.innerHTML = '<i class="fa-regular fa-lock"></i> 已鎖定';
                submitBtn.className = '';
            } else {
                submitBtn.innerHTML = '<i class="fa-regular fa-paper-plane"></i> 送出答案';
                submitBtn.className = '';
            }
        }

        function disableAllInputs(disabled) {
            choiceBtns.forEach(b => b.disabled = true);
            textInput.disabled = true;
            submitBtn.disabled = true;
            if (disabled) {
                submitBtn.innerHTML = '<i class="fa-regular fa-lock"></i> 已鎖定';
                submitBtn.className = 'locked';
            }
        }

        function lockInput() {
            enableInput(false, STATE.questionType);
            submitBtn.innerHTML = '<i class="fa-regular fa-check-circle"></i> 已送出';
            submitBtn.className = 'submitted';
            setStatus('<i class="fa-regular fa-lock" style="margin-right:6px;"></i>已送出答案（鎖定）', 'locked');
            STATE.isLocked = true;
        }

        // ============================================================
        // 13. 計時器
        // ============================================================
        let timerInterval = null;

        function startTimer(seconds) {
            clearTimer();
            let remain = seconds;
            STATE.timerSeconds = remain;
            timerDisplay.textContent = remain + 's';
            timerDisplay.className = 'exam-timer';
            if (remain <= 5) {
                timerDisplay.className = 'exam-timer urgent';
            }
            timerInterval = setInterval(() => {
                remain--;
                STATE.timerSeconds = remain;
                timerDisplay.textContent = remain + 's';
                if (remain <= 5) {
                    timerDisplay.className = 'exam-timer urgent';
                } else {
                    timerDisplay.className = 'exam-timer';
                }
                if (remain <= 0) {
                    clearTimer();
                    timerDisplay.textContent = '⌛ 時間到！';
                    timerDisplay.className = 'exam-timer urgent';
                    if (!STATE.isLocked && STATE.isAnswering) {
                        setStatus('<i class="fa-regular fa-clock" style="margin-right:6px;"></i>時間到！請儘快送出。', 'waiting');
                    }
                }
            }, 1000);
        }

        function clearTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timerDisplay.textContent = '--';
            timerDisplay.className = 'exam-timer';
        }

        // ============================================================
        // 14. 送出答案
        // ============================================================
        async function submitAnswer() {
            if (STATE.isLocked) {
                alert('你已經送出答案，不能再修改。');
                return;
            }
            if (!STATE.isAnswering) {
                alert('教師尚未開放作答，請稍候。');
                return;
            }
            if (STATE.isScreenLocked) {
                alert('教師已鎖定畫面，請稍候。');
                return;
            }

            const qType = STATE.questionType;

            if (qType === 'choice') {
                const selected = choiceGrid.querySelector('.choice-btn.selected');
                if (!selected) { alert('請選擇 A/B/C/D'); return; }
                const choice = selected.dataset.choice;
                await doSubmit(choice, '');
                return;
            }

            if (qType === 'text') {
                const text = textInput.value.trim();
                if (!text) { alert('請輸入文字答案'); return; }
                await doSubmit('', text);
                return;
            }
        }

        async function doSubmit(choice, text) {
            try {
                const ansRef = doc(db, 'rooms', STATE.roomId, 'answers', STATE.studentId);
                await setDoc(ansRef, {
                    studentId: STATE.studentId,
                    name: STATE.studentName,
                    roundId: STATE.currentRoundId,
                    choice: choice || '',
                    text: text || '',
                    timestamp: serverTimestamp(),
                });
                STATE.myAnswer = { choice, text };
                STATE.isLocked = true;
                setStatus('<i class="fa-regular fa-check-circle" style="margin-right:6px;"></i>已成功送出！', 'ready');
                submitBtn.innerHTML = '<i class="fa-regular fa-check-circle"></i> 已送出';
                submitBtn.className = 'submitted';
                const studentRef = doc(db, 'rooms', STATE.roomId, 'students', STATE.studentId);
                await updateDoc(studentRef, { online: true });
            } catch (e) {
                alert('❌ 送出失敗：' + e.message);
            }
        }

        // ============================================================
        // 15. 廣播 Modal
        // ============================================================
        function listenTeacherFocus() {
            const roomRef = doc(db, 'rooms', STATE.roomId);
            return onSnapshot(roomRef, (snapshot) => {
                const data = snapshot.data();
                if (data && data.teacherFocus) {
                    broadcastImage.src = data.teacherFocus;
                    broadcastModalOverlay.classList.add('show');
                    clearTimeout(broadcastModalOverlay._timeout);
                    broadcastModalOverlay._timeout = setTimeout(() => {
                        broadcastModalOverlay.classList.remove('show');
                    }, 10000);
                }
            }, (err) => {
                console.warn('監聽廣播失敗', err);
            });
        }

        broadcastModalOverlay.addEventListener('click', () => {
            broadcastModalOverlay.classList.remove('show');
        });

        // ============================================================
        // 16. 事件綁定
        // ============================================================
        joinRoomBtn.addEventListener('click', joinRoom);
        roomInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
            if (roomInput.value.length === 4) {
                joinRoom();
            }
        });

        studentSelect.addEventListener('change', () => {
            if (studentSelect.value && classSelect.value) {
                loginStatus.textContent = '✅ 已選取，請點擊「加入教室」';
            }
        });

        joinRoomBtn.addEventListener('click', async () => {
            if (classSelect.value && studentSelect.value && !STATE.isLoggedIn) {
                await confirmJoin();
                return;
            }
            await joinRoom();
        });

        changeStudentBtn.addEventListener('click', changeStudent);

        choiceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (STATE.isLocked || !STATE.isAnswering) return;
                if (STATE.questionType !== 'choice') return;
                if (STATE.isScreenLocked) return;
                choiceBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                STATE.myAnswer = { choice: btn.dataset.choice, text: textInput.value.trim() || '' };
            });
        });

        textInput.addEventListener('input', () => {
            if (STATE.isLocked || !STATE.isAnswering) return;
            if (STATE.isScreenLocked) return;
            charCount.textContent = textInput.value.length + ' 字';
            if (STATE.myAnswer && STATE.myAnswer.choice) {
                STATE.myAnswer.text = textInput.value.trim() || '';
            }
        });

        submitBtn.addEventListener('click', submitAnswer);

        // ============================================================
        // 17. 初始化
        // ============================================================
        async function init() {
            await loadRoster();

            const urlParams = new URLSearchParams(window.location.search);
            const roomFromUrl = urlParams.get('room');
            if (roomFromUrl && /^\d{4}$/.test(roomFromUrl)) {
                roomInput.value = roomFromUrl;
                setTimeout(() => joinRoom(), 500);
            }

            if (STATE.roomId) {
                listenTeacherFocus();
            }

            console.log('📝 學生端 v2.0 (視覺翻新) 已啟動！');
        }

        init();
    </script>
</body>
</html>
