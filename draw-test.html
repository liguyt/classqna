<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tool 2: 畫布沙盒測試</title>
  
  <link rel="stylesheet" href="https://unpkg.com/tldraw@2/tldraw.css" />
  
  <style>
    /* 讓畫布填滿整個螢幕，不出現捲軸 */
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8f9fa; }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "tldraw": "https://esm.sh/tldraw@2"
    }
  }
  </script>

  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { Tldraw } from 'tldraw';

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    
    // 將 tldraw 畫布渲染到網頁上
    root.render(React.createElement(Tldraw));
  </script>
</body>
</html>
