<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tool 2 繪圖測試 (tldraw)</title>
    <!-- 使用正確的 tldraw CDN 版本 (UMD) -->
    <script src="https://unpkg.com/tldraw@2.4.0/dist/tldraw.umd.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f9;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 16px 0;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 20px;
            color: #0b2b4a;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: #1a5c9e;
            color: white;
        }
        .btn-primary:hover {
            background: #12447a;
        }
        .btn-success {
            background: #1f8b5c;
            color: white;
        }
        .btn-success:hover {
            background: #16734a;
        }
        .btn-danger {
            background: #c73d3d;
            color: white;
        }
        .btn-danger:hover {
            background: #a82e2e;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #1a5c9e;
            color: #1a5c9e;
        }
        .btn-outline:hover {
            background: #1a5c9e;
            color: white;
        }
        #canvas-container {
            flex: 1;
            min-height: 400px;
            border: 2px solid #d7e0e9;
            border-radius: 16px;
            overflow: hidden;
            background: white;
            position: relative;
        }
        #status {
            flex-shrink: 0;
            padding: 10px 16px;
            background: #e9f1fa;
            border-radius: 12px;
            margin-top: 12px;
            font-size: 14px;
            color: #1a3a5a;
        }
        #status .loading {
            color: #d68d2c;
        }
        #status .ready {
            color: #1f8b5c;
        }
        #status .error {
            color: #c73d3d;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎨 Tool 2 繪圖測試 (tldraw)</h1>
        <div class="btn-group">
            <button class="btn btn-outline" id="loadImageBtn">📷 載入底圖</button>
            <button class="btn btn-success" id="exportBtn">📤 匯出 PNG</button>
            <button class="btn btn-danger" id="clearBtn">🗑️ 清除</button>
            <input type="file" id="imageInput" accept="image/*" style="display:none;" />
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="status">
        <span id="statusText">⏳ 正在載入 tldraw...</span>
    </div>

    <script>
        // ============================================================
        // Tool 2 - draw.html 獨立測試頁面 (使用 tldraw UMD)
        // ============================================================

        let editor = null;
        let container = document.getElementById('canvas-container');
        const statusText = document.getElementById('statusText');

        function setStatus(msg, type = 'loading') {
            statusText.textContent = msg;
            statusText.className = type;
        }

        // ----- 1. 初始化 tldraw -----
        function initTldraw() {
            try {
                // 檢查 tldraw 是否已載入
                if (typeof window.Tldraw === 'undefined') {
                    setStatus('❌ tldraw 尚未載入，請檢查網路連線', 'error');
                    return;
                }

                setStatus('🔄 正在初始化 tldraw...', 'loading');

                // 建立 tldraw 編輯器 (使用官方推薦方式)
                const store = window.Tldraw.createTLStore();

                // 建立編輯器實例
                const editorInstance = new window.Tldraw.TldrawEditor({
                    container: container,
                    store: store,
                    // 啟用工具列與 UI
                    ui: {
                        tools: true,
                        styles: true,
                        darkMode: false,
                    },
                });

                // 保存實例供後續使用
                editor = editorInstance;

                setStatus('✅ tldraw 已成功載入！可以使用下方工具列繪圖', 'ready');
                console.log('tldraw 編輯器已初始化', editor);

            } catch (e) {
                setStatus('❌ 初始化失敗：' + e.message, 'error');
                console.error(e);
            }
        }

        // 等待 DOM 與 tldraw 載入完成後初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 給 tldraw 一點時間載入
            setTimeout(initTldraw, 800);
        });

        // 如果 DOM 已載入，立即初始化
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(initTldraw, 800);
        }

        // ----- 2. 載入底圖 -----
        document.getElementById('loadImageBtn').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const imgData = ev.target.result;
                setStatus('📷 底圖已載入，請在畫布上繪圖', 'ready');
                // 實際使用時，這裡會將圖片設為 tldraw 的底圖
                // 目前 tldraw UMD 設定背景圖的方式需要透過 shape 或 asset
                console.log('底圖數據載入完成', imgData.substring(0, 100) + '...');
            };
            reader.readAsDataURL(file);
        });

        // ----- 3. 匯出圖片 -----
        document.getElementById('exportBtn').addEventListener('click', async () => {
            if (!editor) {
                setStatus('❌ 請等待 tldraw 載入完成', 'error');
                return;
            }
            setStatus('📤 正在匯出圖片...', 'loading');
            try {
                // 嘗試使用 tldraw 的匯出 API
                // 不同版本的 API 可能不同，此處使用通用方式
                const canvas = container.querySelector('canvas');
                if (canvas) {
                    const dataUrl = canvas.toDataURL('image/png');
                    // 下載圖片
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = `tldraw_export_${Date.now()}.png`;
                    link.click();
                    setStatus('✅ 圖片已匯出下載', 'ready');
                } else {
                    setStatus('⚠️ 找不到畫布，請確認 tldraw 已完全載入', 'error');
                }
            } catch (e) {
                setStatus('❌ 匯出失敗：' + e.message, 'error');
                console.error(e);
            }
        });

        // ----- 4. 清除畫布 -----
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (!editor) {
                setStatus('⚠️ 請等待 tldraw 載入完成', 'error');
                return;
            }
            try {
                // 清除所有 shape
                const shapes = editor.getShapes();
                if (shapes && shapes.length > 0) {
                    editor.deleteShapes(shapes);
                }
                setStatus('🗑️ 畫布已清除', 'ready');
            } catch (e) {
                setStatus('❌ 清除失敗：' + e.message, 'error');
                console.error(e);
            }
        });
    </script>
</body>
</html>
