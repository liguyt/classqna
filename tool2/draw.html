<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tool 2 繪圖測試 (融合版)</title>
    
    <!-- tldraw 官方樣式 -->
    <link rel="stylesheet" href="https://unpkg.com/tldraw@2/tldraw.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f9;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 16px 0;
            flex-shrink: 0;
        }
        .header h1 { font-size: 20px; color: #0b2b4a; }
        .btn-group { display: flex; gap: 10px; }
        .btn {
            padding: 8px 20px; border: none; border-radius: 30px;
            font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .btn-success { background: #1f8b5c; color: white; }
        .btn-success:hover { background: #16734a; }
        .btn-danger { background: #c73d3d; color: white; }
        .btn-danger:hover { background: #a82e2e; }
        .btn-outline { background: transparent; border: 2px solid #1a5c9e; color: #1a5c9e; }
        .btn-outline:hover { background: #1a5c9e; color: white; }
        
        #canvas-container {
            flex: 1; min-height: 400px; border: 2px solid #d7e0e9;
            border-radius: 16px; overflow: hidden; background: white; position: relative;
        }
        #status {
            flex-shrink: 0; padding: 10px 16px; background: #e9f1fa;
            border-radius: 12px; margin-top: 12px; font-size: 14px; color: #1a3a5a;
        }
        .loading { color: #d68d2c; }
        .ready { color: #1f8b5c; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎨 Tool 2 繪圖測試 (tldraw)</h1>
        <div class="btn-group">
            <button class="btn btn-outline" id="loadImageBtn">📷 測試按鈕</button>
            <button class="btn btn-danger" id="clearBtn">🗑️ 清除畫布</button>
        </div>
    </div>

    <!-- 畫布將渲染在這個 div 裡面 -->
    <div id="canvas-container"></div>

    <div id="status">
        <span id="statusText" class="loading">⏳ 正在載入 tldraw...</span>
    </div>

    <!-- 1. 使用我們之前成功的 importmap 載入依賴 -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "tldraw": "https://esm.sh/tldraw@2?external=react,react-dom"
        }
    }
    </script>

    <!-- 2. 正確的 React 渲染邏輯 -->
    <script type="module">
        import React, { useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Tldraw } from 'tldraw';

        // 宣告一個全域變數來存放 tldraw 的核心操作引擎
        let globalEditor = null;
        const statusText = document.getElementById('statusText');

        // 建立一個 React 元件來包裝畫布
        function App() {
            // 當畫布載入完成時，擷取 editor 實例
            const handleMount = useCallback((editor) => {
                globalEditor = editor;
                statusText.textContent = '✅ tldraw 已成功載入！可以使用上方按鈕測試';
                statusText.className = 'ready';
            }, []);

            // 渲染畫布，並傳入 onMount 事件
            return React.createElement(Tldraw, { onMount: handleMount });
        }

        // 將 React 元件掛載到畫面上
        const rootElement = document.getElementById('canvas-container');
        const root = createRoot(rootElement);
        root.render(React.createElement(App));

        // ==========================================
        // 綁定外部按鈕事件 (使用 globalEditor 進行操作)
        // ==========================================

        // 清除按鈕邏輯
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (!globalEditor) return;
            // 取得目前畫布上所有的形狀 ID
            const allShapeIds = Array.from(globalEditor.getCurrentPageShapeIds());
            // 刪除它們
            globalEditor.deleteShapes(allShapeIds);
            statusText.textContent = '🗑️ 畫布已清除';
        });

        // 測試按鈕邏輯
        document.getElementById('loadImageBtn').addEventListener('click', () => {
            if (!globalEditor) return;
            alert("畫布引擎連接成功！");
        });
    </script>
</body>
</html>
